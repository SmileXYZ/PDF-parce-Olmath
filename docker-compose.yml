services:
  olymp-parser:
    build: .
    image: olymp-parser:1.0
    container_name: olymp-parser
    restart: unless-stopped
    ports:
      - "8080:8080"          # за Coolify/Traefik можно убрать и повесить домен
    environment:
      MAX_PDF_BYTES: "41943040"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
